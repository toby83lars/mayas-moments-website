<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- ⚠️  PLACEHOLDER LOGO — replace this entire file with Maya's actual
       circular watermark logo (SVG or PNG). Keep the filename logo-placeholder.svg
       OR update the src= attribute in all four HTML files at once. -->

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="#FAF7F2" stroke="#3D3530" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#3D3530" stroke-width="0.6"/>

  <!-- Circular text path (top arc) -->
  <defs>
    <path id="top-arc" d="M 22,100 A 78,78 0 0,1 178,100"/>
    <path id="bot-arc" d="M 178,100 A 78,78 0 0,1 22,100"/>
  </defs>

  <text font-family="Georgia, 'Times New Roman', serif" font-size="11.5" fill="#3D3530" letter-spacing="4.2">
    <textPath href="#top-arc" text-anchor="middle" startOffset="50%">MAYA'S MOMENTS FL</textPath>
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="9.5" fill="#7A6B64" letter-spacing="3.5">
    <textPath href="#bot-arc" text-anchor="middle" startOffset="50%">PHOTOGRAPHY</textPath>
  </text>

  <!-- Simple camera icon in center -->
  <rect x="76" y="84" width="48" height="36" rx="5" fill="none" stroke="#3D3530" stroke-width="1.8"/>
  <circle cx="100" cy="102" r="10" fill="none" stroke="#3D3530" stroke-width="1.8"/>
  <circle cx="100" cy="102" r="4" fill="#3D3530"/>
  <rect x="88" y="80" width="12" height="7" rx="2" fill="#3D3530"/>
  <circle cx="116" cy="89" r="2.5" fill="#3D3530"/>
</svg>
